server:
  port: 8086

spring:
  application:
    name: notification-service
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: notification_service
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4
          max-wait: -1ms
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    from-name: EvoTicket
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

swagger:
  host-url: http://localhost:${server.port}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  show-actuator: true

app:
  logo: https://lh3.googleusercontent.com/gg-dl/ABS2GSmQ6YCD-66aRIlJWwztbN_8uwbdPav7P5rIB9CrLQv4QnrRGojV9zPOph9Ip8FIy5xhVBz5NpT4pR0r4lB7RWviImVbI3Dm2XJKCtsDBpgoRNRjBHdDlVo1bj_sNeeWEo864wo2jj8ttMwcunaBNdmFVaOKZpYQRCLDtkaNLVVDxVVe8A=s1024-rj

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always